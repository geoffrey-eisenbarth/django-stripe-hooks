name: Continuous Integration

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        django-version: ["~=6.0.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Stripe CLI
        run: |
          curl -L https://github.com/stripe/stripe-cli/releases/download/v1.39.0/stripe_1.39.0_linux_x86_64.tar.gz -o stripe.tar.gz
          sudo tar -xvf stripe.tar.gz -C /usr/local/bin

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry run pip install "Django${{ matrix.django-version }}"
          poetry install --with dev

      - name: Lint with flake8
        run: poetry run flake8

      - name: Check types with mypy
        run: poetry run mypy

      - name: Run tests
        env:
          # Map GitHub Secrets to Environment Variables
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # The Stripe CLI specifically looks for this name:
          STRIPE_API_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          poetry run pytest --cov --cov-branch --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          name: codecov-django-ctct
          token: ${{ secrets.CODECOV_TOKEN }}
