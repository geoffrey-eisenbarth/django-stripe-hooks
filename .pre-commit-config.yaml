repos:
  - repo: https://github.com/PyCQA/flake8
    rev: '7.3.0'
    hooks:
      - id: flake8
        args: [--config=.flake8]
        exclude: ^django_stripe_hooks/migrations/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.19.1'
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - django-stubs
          - django-stubs-ext
          - stripe==14.4.1
          - django-environ
          - pytest
          - pytest-django
